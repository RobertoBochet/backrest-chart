{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "backrest.fullname" . -}}
{{- $httpPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "backrest.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    - matches:
    {{- with .Values.httpRoute.matches.path }}
        - path:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.httpRoute.matches.timeouts }}
      timeouts:
      {{- toYaml . | nindent 6 }}
    {{- end }}
      backendRefs:
        - kind: Service
          name: {{ $fullName }}
          port: {{ $httpPort }}
    {{- with .Values.httpRoute.filters }}
      filters:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
